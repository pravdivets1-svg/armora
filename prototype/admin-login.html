<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a1422" />
  <title>Вход — СтальДверь</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0a1422; color:#e6eef9; font-family:Inter,system-ui,sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
    body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:-1;
      background: radial-gradient(60rem 40rem at 50% -20%, rgba(107,149,209,0.15), transparent 60%),
                  radial-gradient(40rem 30rem at 50% 120%, rgba(212,228,247,0.06), transparent 60%); }
    [data-lucide] { width:1em; height:1em; }
    .input { background:#0e1a2c; border:1px solid #243349; color:#e6eef9; border-radius:0.5rem;
             padding:0.65rem 0.9rem; font-size:0.95rem; width:100%; transition:border-color .15s, box-shadow .15s; }
    .input:focus { outline:none; border-color:#6b95d1; box-shadow:0 0 0 3px rgba(107,149,209,0.2); }
    .field-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.06em; color:#8aa0bd; font-weight:500; }
  </style>
</head>
<body>
  <form class="w-full max-w-sm bg-arctic-surface bg-[#142033] rounded-2xl p-7 space-y-5"
        style="box-shadow:0 1px 0 rgba(255,255,255,0.05) inset, 0 20px 40px -10px rgba(0,0,0,0.6); border:1px solid #243349;">

    <div class="text-center">
      <div class="w-12 h-12 mx-auto rounded-xl bg-[#6b95d1]/15 ring-1 ring-[#6b95d1]/30 flex items-center justify-center">
        <i data-lucide="door-closed" class="text-[#6b95d1] text-xl"></i>
      </div>
      <div class="mt-3 text-lg font-semibold tracking-tight">СтальДверь</div>
      <div class="text-sm text-[#8aa0bd] mt-0.5">Вход для сотрудников</div>
    </div>

    <label class="block">
      <span class="field-label">Email</span>
      <input type="email" required class="input mt-1" autocomplete="email" />
    </label>
    <label class="block">
      <span class="field-label">Пароль</span>
      <input type="password" required class="input mt-1" autocomplete="current-password" />
    </label>

    <button class="w-full px-4 py-2.5 rounded-lg bg-[#6b95d1] hover:bg-[#82a8df] text-[#0a1422] font-semibold transition inline-flex items-center justify-center gap-2"
            style="box-shadow:0 4px 14px -4px rgba(107,149,209,0.4);">
      <i data-lucide="log-in"></i> Войти
    </button>

    <p class="text-xs text-[#8aa0bd]/70 text-center">
      Забыли пароль — обратитесь к директору
    </p>
  </form>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
